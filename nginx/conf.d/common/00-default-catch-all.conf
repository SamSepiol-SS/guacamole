# --------------------------------------------------------
# Catch-All Default Server
# Drops traffic for any domain not explicitly defined
# --------------------------------------------------------

# HTTP Catch-All
server {
    listen 80 default_server;
    server_name _; 
    return 444;    

# HTTPS Catch-All
server {
    listen 443 ssl default_server;
    server_name _;

    include /etc/nginx/snippets/ssl-params.conf;

    return 444; # Silently drop the connection
}
