user nginx;
worker_processes auto;
worker_rlimit_nofile 200000;
worker_priority -5;

pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 40000;
    multi_accept on;
    use epoll;
    accept_mutex off;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;  # Sends VNC keystrokes instantly

    keepalive_timeout 300;
    keepalive_requests 10000;

    types_hash_max_size 2048;
    server_tokens off;
    server_names_hash_bucket_size 128;
    server_names_hash_max_size 2048;

    # WebSocket Upgrade Map (Required for noVNC / VSCode)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Buffer Sizes - Optimized for DaaS with large ISO transfers
    client_body_buffer_size 256k;
    client_max_body_size 2000m;
    client_header_buffer_size 4k;
    large_client_header_buffers 8 16k;
    output_buffers 2 64k;
    postpone_output 1460;

    # Timeouts - Extended for interactive DaaS sessions
    client_body_timeout 300s;
    client_header_timeout 300s;
    send_timeout 300s;
    reset_timedout_connection on;

    # Base Proxy Settings
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Logging with Performance Metrics
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format daas '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    'service=$server_name upstream=$upstream_addr '
                    'request_time=$request_time '
                    'upstream_response_time=$upstream_response_time '
                    'connection=$connection connection_requests=$connection_requests';

    access_log /var/log/nginx/access.log main buffer=64k flush=5m;
    error_log /var/log/nginx/error.log warn;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types application/atom+xml application/javascript application/json application/ld+json application/manifest+json application/rss+xml application/vnd.geo+json application/vnd.ms-fontobject application/x-font-ttf application/x-web-app-manifest+json application/xhtml+xml application/xml font/opentype image/bmp image/svg+xml image/x-icon text/cache-manifest text/css text/plain text/vcard text/vnd.rim.location.xloc text/vtt text/x-component text/x-cross-domain-policy;

    # Rate Limiting Zones (DDoS protection)
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=websocket:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Apply BASE proxy parameters globally (No buffering, standard HTTP headers)
    # NOTE: We explicitly include only this one, so websocket 24h timeouts don't leak globally
    include /etc/nginx/snippets/proxy-params.conf;

    # Common Configurations (monitoring, health checks)
    include /etc/nginx/conf.d/common/*.conf;

    # RDP Applications 
    include /etc/nginx/conf.d/rdp/*.conf;
}